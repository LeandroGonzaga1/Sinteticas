name: Build & Push comfyui-wan2 to GHCR

on:
  push:
    paths:
      - 'docker/Dockerfile.spheron-wan'
      - 'docker/entrypoint.sh'
      - 'docker/download_models.py'
      - '.github/workflows/build-comfyui-wan.yml'
  workflow_dispatch:  # permite trigger manual pelo GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leandrogonzaga1/comfyui-wan2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.spheron-wan
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Models are baked into the image at build time (docker/download_models.py).
          # Repos são públicos no HF — sem HF_TOKEN.

      # NOTE: package visibility (public) is set once in the GitHub UI and persists
      # across pushes. We do NOT PATCH it per-build — the default GITHUB_TOKEN lacks
      # permission for /user/packages visibility changes (that needs a classic PAT),
      # and the step was failing the whole workflow even though the build succeeded.
      # Confirmed public via anonymous GHCR pull on 2026-06-13.
