name: Build & Push comfyui-wan2 to GHCR

on:
  push:
    paths:
      - 'docker/Dockerfile.spheron-wan'
      - 'docker/entrypoint.sh'
      - 'docker/download_models.py'
      - '.github/workflows/build-comfyui-wan.yml'
  workflow_dispatch:  # permite trigger manual pelo GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leandrogonzaga1/comfyui-wan2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.spheron-wan
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # HF_TOKEN não vai no build arg — é injetado em runtime via entrypoint.sh
          # O entrypoint.sh lê HF_TOKEN da env var do container (Spheron .env)

      - name: Make package public
        run: |
          gh api --method PATCH \
            "/user/packages/container/${{ env.IMAGE_NAME }}/visibility" \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
