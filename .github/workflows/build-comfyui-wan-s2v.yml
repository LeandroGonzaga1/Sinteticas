name: Build & Push comfyui-wan-s2v to GHCR (separate from I2V)

on:
  push:
    paths:
      - 'docker/Dockerfile.s2v'
      - 'docker/download_models_s2v.py'
      - '.github/workflows/build-comfyui-wan-s2v.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leandrogonzaga1/comfyui-wan-s2v   # SEPARATE image from I2V

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android
          sudo rm -rf /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.s2v
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # S2V layers are baked at build time via docker/download_models_s2v.py.
          # Repos are public on HF — no HF_TOKEN required.

      # NOTE: package visibility (public) is set once in the GitHub UI and
      # persists across pushes. We do NOT PATCH it per-build.
